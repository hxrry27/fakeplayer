# DO NOT EDIT
version: 20

i18n:
  locale: zh

# Define the maximum number of fake players on the server at the same time
# default: 1000
server-limit: 1000

# Define the maximum number of fake players each player can spawn
# Default: 1
player-limit: 1

# Define whether to check if players with the same IP sharing `player-limit`
detect-ip: true

# Define the maximum lifespan of fake players
# Unit: minute, `0` represents permanent
lifespan: 0

# Name template of fake players
# If this value is empty, fake players will use creators' name as their name and add a numerical suffix
name-template: ''

# Name prefix.
# Prefix will be added to the generated name or specified name
name-prefix: ''
name-pattern: '^[a-zA-Z0-9_]+$'

# How a specified name is allowed to be spawned as a fake player.
# Only applies to `/fp spawn <name>`; generated names are never gated.
# Options:
#   PLAYED_BEFORE: Reject any name belonging to a real account that has joined this server
#   ALLOWLIST: Only allow the names or UUIDs listed in `name-allowlist`
name-gate: PLAYED_BEFORE

# Example:
#   name-allowlist:
#     - Notch
#     - 069a79f4-44e9-4726-a5be-fca90e38aaf5
name-allowlist: []

# Name style on Tab listing
# Options:
#   black, dark_blue, dark_green, dark_aqua, dark_red, dark_purple, gold, gray,
#   dark_gray, blue, green, aqua, red, light_purple, yellow, white
#   obfuscated, bold, strikethrough, underlined, italic
name-style: gray, italic

# Options:
#   NEVER: do not prevent kicking
#   ON_SPAWNING: only prevent kicking when fake players is spawning, but some plugin will kick them on the next tick, in such causes you should use `ALWAYS`
#   ALWAYS: always prevent kicking from other plugins and command `/kick`
prevent-kicking: ON_SPAWNING

# whether fake players should be removed when the creator leaves the server
follow-quiting: true

# whether fake players will drop items from their inventory when they are removed / killed
drop-inventory-on-quiting: false

persistent-data: true

# Define whether kick the fake player who was dead,
# if this value is false, players can type command '/fp respawn' to respawn them
kick-on-dead: true

# Server will detect tps every 5 minutes, if the average tps is lower than this value, all fake players will be removed
# Default: 0, means disabled
kale-tps: 0


# TODO: REMOVE THIS 
# Invsee implement:
# Options:
#   AUTO: Auto choose a implement depends on server plugins. Supports: OpenInv
#   SIMPLE: A simple implement, with it, you can NOT visit or modify equipments
invsee-implement: AUTO

# ============================================
#                  COMMANDS
# ============================================

# all of the below have:
# Variables:
#   %p: the name of the fake player
#   %u: the UUID of the fake player
#   %c: the name of the creator

# Pre-Spawn-Commands
# Server will execute the following commands BEFORE trying to spawn a fake player
pre-spawn-commands:
  - ''
  - ''

# Post-Spawn-Commands
# Server will execute the following commands DURING spawning (in PlayerJoinEvent)
post-spawn-commands:
  - ''
  - ''

# After-Spawn-Commands
# Server will execute the following commands AFTER the fake player was spawned (after PlayerJoinEvent)
after-spawn-commands:
  - ''
  - ''

# Self-Commands
# The fake player will execute the following commands AFTER they have joined the server fully
self-commands:
  - ''
  - ''


# Post-Destroy-Commands
# The server will execute the following commands when the fake player is quitting but has not yet left
post-quit-commands:
  - ''
  - ''

# Post-Destroy-Commands
# The server will execute the following commands AFTER the fake player has fully quit the game
after-quit-commands:
  - ''
  - ''

# Define which commands can be executed by `/fp cmd` without 'fakeplayer.cmd' permission
allow-commands:
  - ''
  - ''

# Default Features of fake players
# It takes effect when the player has never changed the config by '/fp config' or has no permission.
default-features:
  collidable: true
  pickup_items: true
  skin: true
  look_at_entity: false
  invulnerable: false
  replenish: false
  autofish: false
  autosleep: false
  wolverine: false

# This fork (hxrry27/fakeplayer) does not publish GitHub releases, so this is redundant but i'm
# leaving it in, should we choose to re-enable it at a later date
check-for-updates: false
