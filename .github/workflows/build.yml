name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            21
            25
          cache: 'gradle'

      - name: Cache paperweight setup
        uses: actions/cache@v4
        with:
          path: |
            fakeplayer-v26_*/.gradle/caches/paperweight
            ~/.gradle/caches/paperweight
          key: paperweight-${{ runner.os }}-${{ hashFiles('build.gradle') }}
          restore-keys: |
            paperweight-${{ runner.os }}-

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fakeplayer-jar
          path: target/libs/*.jar
          if-no-files-found: error
